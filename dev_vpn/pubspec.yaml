name: dev_vpn
description: "Ulya VPN на базе v2ray_box"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_v2ray_plus: ^1.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  share_plus: ^11.0.0
  flutter_svg: ^2.2.3
  flutter_native_splash: ^2.4.7
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/anim/loading.json
    - assets/icon/logo.svg

flutter_native_splash:
  color: "#0F0F1A"
  image: assets/image/splash_icon.png
  android: true
  ios: true
  android_12:
    color: "#0F0F1A"
    image: assets/image/splash_icon.png
    icon_background_color: "#0F0F1A"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#230E40"
  adaptive_icon_foreground: "assets/image/app_icon.png"

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
